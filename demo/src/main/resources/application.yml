server:
  address: 0.0.0.0
  port: 8080

spring:
  application:
    name: my-web-ide

  config:
    import: "optional:classpath:application-secret.yml"

  jackson:
    mapper:
      accept-case-insensitive-enums: true

  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/myide?useSSL=false&characterEncoding=UTF-8&serverTimezone=Asia/Seoul}
    driverClassName: com.mysql.cj.jdbc.Driver
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:mysql}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB

  ide:
    docker:
      host: ${DOCKER_HOST_URL:tcp://localhost:2375}
      workspace-path: ${IDE_WORKSPACE_PATH:./temp-workspace}

jwt:
  secret: ${JWT_SECRET:aW52YWxpZC1zZWNyZXQta2V5LXRlc3QtdmFsdWUtZm9yLWNhcHN0b25lLXByb2plY3Q=}
  access-token-expiration-ms: 900000
  refresh-token-expiration-ms: 1209600000

auth:
  refresh-cookie:
    name: refreshToken
    secure: false
    same-site: Lax

github:
  client:
    id: ${GITHUB_CLIENT_ID:}
    secret: ${GITHUB_CLIENT_SECRET:}
    redirect-uri: ${GITHUB_REDIRECT_URI:http://localhost:3000/auth/github/callback}
